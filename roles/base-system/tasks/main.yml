---
- name: Install essential system packages (Debian/Ubuntu)
  ansible.builtin.package:
    name:
      # Build tools
      - build-essential
      # System utilities
      - curl
      - htop
      - unzip
      - openssh-server
      - tar
      - tree
      # Development tools
      - tmux
      - git
      - silversearcher-ag
      - stow
      # Utils
      - jq
      - lsof
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install essential system packages (RedHat/Fedora)
  ansible.builtin.package:
    name:
      # Build tools
      - gcc
      - gcc-c++
      - make
      # System utilities
      - curl
      - htop
      - unzip
      - openssh-server
      - tar
      - tree
      - glibc
      # Development tools
      - tmux
      - git
      - the_silver_searcher
      - stow
      # Python - handled by uv
      #- python3-devel
      #- python3-pip
      # Utils
      - bat
      - ffmpeg
      - htop
      - jq
      - lsof
      # Misc
      - lua
      - luajit
      - lua-devel
      - nvtop
      - vifm
      - libwebp
      #- wget
      - xclip
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Install essential system packages (Arch)
  ansible.builtin.package:
    name:
      # Build tools
      - base-devel
      # System utilities
      - curl
      - htop
      - unzip
      - openssh
      - tar
      - tree
      - glibc
      # Development tools
      - tmux
      - git
      - the_silver_searcher
      - stow
      # Python - handled by uv
      # - python
      #- python-pip
      # Utils
      - bat
      - ffmpeg
      - htop
      - jq
      - lsof
      # Misc
      - lua
      - luajit
      - nvtop
      - vifm
      - libwebp
      #- wget
      - xclip
    state: present
  become: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Create projects directory
  ansible.builtin.file:
    path: "{{ home_dir }}/projects"
    state: directory
    mode: '0755'
  become: false

- name: Check if running in distrobox
  ansible.builtin.stat:
    path: "/.containersetupdone"
  register: containerenv

- name: Set timezone
  ansible.builtin.timezone:
    name: America/Chicago
  become: true
  when: not containerenv.stat.exists
  ignore_errors: true

- name: Copy timezone from host (distrobox environment)
  ansible.builtin.shell: |
    cp /etc/timezone /etc/timezone.bak || true
    cp /usr/share/zoneinfo/America/Chicago /etc/localtime || true
  become: true
  when: containerenv.stat.exists
  ignore_errors: true

- name: Install fzf with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/junegunn/fzf! | bash
  become: true
- name: Install atuin with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/atuinsh/atuin! | bash
  become: true
- name: Install ripgrep with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/BurntSushi/ripgrep! | bash
  become: true
- name: Install dust with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/bootandy/dust! | bash
  become: true
- name: Install bandwhich with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/imsnif/bandwhich! | bash
  become: true
- name: Install tealdeer with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/dbrgn/tealdeer! | bash
  become: true
- name: Install grex with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/pemistahl/grex! | bash
  become: true
- name: Install systemctl-tui with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/rgwood/systemctl-tui! | bash
  become: true
- name: Install bottom with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/ClementTsang/bottom! | bash
  become: true

- name: Install screenfetch (neofetch alternative)
  ansible.builtin.package:
    name: screenfetch
    state: present
  become: true
  ignore_errors: true

- name: Install Starship prompt
  ansible.builtin.get_url:
    url: https://starship.rs/install.sh
    dest: /tmp/ansible-playbooks-setup/install_starship.sh
  register: starship_download
  become: true

- name: Run Starship install script
  ansible.builtin.shell: |
    sh /tmp/ansible-playbooks-setup/install_starship.sh --yes
  args:
    creates: /usr/local/bin/starship
    executable: /bin/sh
  become: true
  when: starship_download.changed
