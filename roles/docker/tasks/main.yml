---
- name: Add user account to Docker group
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: yes

- name: Install lazydocker with installer
  ansible.builtin.shell: |
    curl -L i.paynepride.com/jesseduffield/lazydocker! | bash
  become: true
