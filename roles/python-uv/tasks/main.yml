---
- name: Install uv Python package manager
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ home_dir }}/.cargo/bin/uv"
    executable: /bin/bash
  become: false

- name: Add uv to PATH in shell profile
  ansible.builtin.lineinfile:
    path: "{{ home_dir }}/.zshrc"
    line: 'export PATH="$HOME/.cargo/bin:$PATH"'
    create: yes
    state: present
  become: false

- name: Install Python build dependencies
  ansible.builtin.package:
    name:
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - curl
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - libxml2-dev
      - libxmlsec1-dev
      - libffi-dev
      - liblzma-dev
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install Python build dependencies (Fedora)
  ansible.builtin.package:
    name:
      - gcc
      - openssl-devel
      - bzip2-devel
      - libffi-devel
      - zlib-devel
      - readline-devel
      - sqlite-devel
      - xz-devel
      - tk-devel
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Install latest Python using uv
  ansible.builtin.shell: |
    uv python install {{ python_version | default('3.12') }}
  args:
    executable: /bin/bash
  become: false
