---
- name: Configure all machines
  hosts: all
  gather_facts: true

  roles:
    - role: homebrew
      tags: ['brew']
    
    - role: neovim
      tags: ['neovim']
    
    - role: base-system
      tags: ['base']
    
    - role: git-setup
      tags: ['git']
    
    - role: ssh-keys
      tags: ['ssh', 'keys']
      when: setup_ssh_keys | default(true) | bool
    
    - role: tailscale
      tags: ['tailscale']
      when: setup_tailscale | default(true) | bool
    
    - role: python-uv
      tags: ['python', 'uv']
      when: install_python_uv | default(true) | bool
    
    - role: shell-setup
      tags: ['shell']
      when: setup_shell | default(true) | bool
    
    - role: dotfiles
      tags: ['dotfiles']
      when: setup_dotfiles | default(false) | bool
    
    - role: development
      tags: ['dev']
      when: install_development_tools | default(false) | bool
    
    - role: geerlingguy.docker
      tags: ['docker', 'dev']
      when: install_docker | default(false) | bool
      become: true

    - role: docker
      tags: ['docker', 'dev']
      when: install_docker | default(false) | bool

    - role: cockpit
      tags: ['cockpit']
      when: install_cockpit | default(false) | bool
